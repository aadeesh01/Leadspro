services:
  - type: web
    name: leadspro-backend
    env: docker
    region: ohio
    plan: free
    dockerCommand: "npm start"
    envVars:
      - key: PORT
        value: 8000
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"
      - key: PUPPETEER_EXECUTABLE_PATH
        value: "/usr/bin/google-chrome-stable"
